<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }} · icuvisor</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" sizes="any" />
  <link rel="icon" href="{{ "favicon-32.png" | relURL }}" type="image/png" sizes="32x32" />
  <link rel="icon" href="{{ "favicon-192.png" | relURL }}" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a class="brand" href="{{ "/" | relURL }}">
        {{ partial "brand.html" . }}
        <span>icuvisor</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="{{ "/#features" | relURL }}">Features</a>
        <a href="{{ "/#install" | relURL }}">Install</a>
        <a href="{{ "/tutorials/" | relURL }}">Tutorials</a>
        <a href="{{ "/reference/tools/" | relURL }}">Tools</a>
        <a class="btn btn-ghost" href="{{ .Site.Params.github }}" rel="noopener">GitHub</a>
      </nav>
    </header>

    <main class="page" role="main">
      <article class="card page-card">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
      </article>
    </main>

    <footer class="site-footer">
      <div>
        <strong>icuvisor</strong> · MIT-licensed · not affiliated with intervals.icu
      </div>
      <div>
        <a href="{{ .Site.Params.github }}" rel="noopener">GitHub</a> ·
        <a href="https://github.com/ricardocabral/icuvisor/blob/main/SECURITY.md" rel="noopener">Security</a> ·
        <a href="https://github.com/ricardocabral/icuvisor/blob/main/CONTRIBUTING.md" rel="noopener">Contribute</a>
      </div>
    </footer>
  </div>
</body>
</html>
