# --- Contributor-friendly ----------------------------------------------------
- name: "good first issue"
  color: "7057ff"
  description: Scoped well for a first-time contributor.
- name: "help wanted"
  color: "008672"
  description: Maintainers would welcome a community PR here.
- name: "hacktoberfest"
  color: "ff7518"
  description: Suitable for Hacktoberfest.

# --- Meta --------------------------------------------------------------------
- name: "dependencies"
  color: "0366d6"
  description: Updates a dependency.
- name: "breaking-change"
  color: "b60205"
  description: Backwards-incompatible change.
- name: "needs-design"
  color: "fef2c0"
  description: Requires a design proposal before implementation.
- name: "epic"
  color: "3e4b9e"
  description: Tracking issue spanning multiple sub-issues.
