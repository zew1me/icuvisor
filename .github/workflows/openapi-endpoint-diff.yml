name: OpenAPI endpoint diff

on:
  workflow_dispatch:
    inputs:
      latest_url:
        description: intervals.icu OpenAPI JSON URL to compare against the pinned baseline
        required: true
        default: https://intervals.icu/api/v1/docs
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

env:
  INTERVALS_OPENAPI_URL: https://intervals.icu/api/v1/docs

jobs:
  endpoint-diff:
    name: Classify OpenAPI key drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate OpenAPI structural-drift report
        shell: bash
        env:
          DISPATCH_URL: ${{ github.event.inputs.latest_url }}
        run: |
          set -euo pipefail
          latest_url="${DISPATCH_URL:-$INTERVALS_OPENAPI_URL}"
          go run ./scripts/openapidiff \
            -baseline scripts/openapidiff/baseline/intervals-openapi.json \
            -latest-url "$latest_url" \
            -output openapi-endpoint-diff.md
          {
            echo "## OpenAPI structural-drift classification"
            echo
            cat openapi-endpoint-diff.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload OpenAPI structural-drift report
        uses: actions/upload-artifact@v7
        with:
          name: openapi-structural-drift-report
          path: openapi-endpoint-diff.md
