name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (for example v0.1.5)"
        required: true
        type: string
      skip_package_managers:
        description: "Recovery rerun only: skip Homebrew and Scoop uploads for this same tag"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GORELEASER_VERSION: "v2.15.2"
  ICUVISOR_MCPB_CLI_PACKAGE: "@anthropic-ai/mcpb@2.1.2"
  RELEASE_REF: ${{ github.event.inputs.tag || github.ref }}
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout=5m

      - name: Validate distribution metadata
        run: make validate-distribution

      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: check

      - name: Validate MCPB manifest
        run: npx --yes "$ICUVISOR_MCPB_CLI_PACKAGE" validate packaging/mcpb/manifest.json

  release:
    name: Build signed macOS DMG and draft release
    runs-on: macos-latest
    needs: preflight
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          for name in APPLE_TEAM_ID APPLE_DEVELOPER_ID_P12_BASE64 APPLE_DEVELOPER_ID_P12_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "error: missing required GitHub Actions secret $name" >&2
              exit 1
            fi
          done

          kc_passphrase="$(openssl rand -hex 24)"
          echo "::add-mask::$kc_passphrase"
          keychain_path="$RUNNER_TEMP/icuvisor-signing.keychain-db"
          p12_path="$RUNNER_TEMP/developer-id.p12"

          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$p12_path"
          security create-keychain -p "$kc_passphrase" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$kc_passphrase" "$keychain_path"
          security import "$p12_path" -k "$keychain_path" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kc_passphrase" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Decode App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          for name in APPLE_API_KEY_ID APPLE_API_KEY_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!name:-}" ]; then
              echo "error: missing required GitHub Actions secret $name" >&2
              exit 1
            fi
          done

          key_dir="$RUNNER_TEMP/notary"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$key_dir"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Generate release notes from changelog
        shell: bash
        run: python3 scripts/release_notes_from_changelog.py "$RELEASE_TAG" > "$RUNNER_TEMP/release-notes.md"

      - name: Configure optional package-manager publishing
        shell: bash
        env:
          SKIP_PACKAGE_MANAGERS: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_package_managers == true }}
          HOMEBREW_TAP_PAT_SECRET: ${{ secrets.HOMEBREW_TAP_PAT }}
          SCOOP_BUCKET_PAT_SECRET: ${{ secrets.SCOOP_BUCKET_PAT }}
        run: |
          set -euo pipefail
          if [ "$SKIP_PACKAGE_MANAGERS" = "true" ]; then
            echo "::notice::Skipping Homebrew and Scoop uploads for manual same-tag recovery rerun."
            exit 0
          fi
          if [ -n "$HOMEBREW_TAP_PAT_SECRET" ]; then
            echo "::add-mask::$HOMEBREW_TAP_PAT_SECRET"
            {
              echo "HOMEBREW_TAP_PAT<<__ICUVISOR_HOMEBREW_PAT__"
              printf '%s\n' "$HOMEBREW_TAP_PAT_SECRET"
              echo "__ICUVISOR_HOMEBREW_PAT__"
            } >> "$GITHUB_ENV"
          fi
          if [ -n "$SCOOP_BUCKET_PAT_SECRET" ]; then
            echo "::add-mask::$SCOOP_BUCKET_PAT_SECRET"
            {
              echo "SCOOP_BUCKET_PAT<<__ICUVISOR_SCOOP_PAT__"
              printf '%s\n' "$SCOOP_BUCKET_PAT_SECRET"
              echo "__ICUVISOR_SCOOP_PAT__"
            } >> "$GITHUB_ENV"
          fi

      - name: Run GoReleaser to draft release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package signed macOS MCPB
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          binary_path="$(find dist -path '*_darwin_all/icuvisor' -type f | sort | head -n 1)"
          if [ -z "$binary_path" ]; then
            echo "error: universal darwin binary not found under dist" >&2
            exit 1
          fi

          identity="${APPLE_DEVELOPER_IDENTITY:-}"
          if [ -z "$identity" ]; then
            identity="$(security find-identity -v -p codesigning | awk -F'\"' '/Developer ID Application/ { print $2; exit }')"
          fi
          if [ -z "$identity" ]; then
            echo "error: no Developer ID Application signing identity found" >&2
            security find-identity -v -p codesigning >&2 || true
            exit 1
          fi

          codesign --force --options runtime --timestamp --sign "$identity" "$binary_path"
          codesign --verify --strict --verbose=2 "$binary_path"

          ICUVISOR_MCPB_BINARY="$binary_path" \
          ICUVISOR_MCPB_VERSION="$version" \
          ICUVISOR_MCPB_PLATFORM=darwin \
          ICUVISOR_MCPB_OUTPUT="dist/icuvisor_${version}_darwin_universal.mcpb" \
            scripts/package_mcpb.sh

          gh release upload "$RELEASE_TAG" "dist/icuvisor_${version}_darwin_universal.mcpb" --clobber

      - name: Build, sign, notarize, and staple macOS DMG
        shell: bash
        run: build/macos/package_dmg.sh
        env:
          ICUVISOR_MACOS_RELEASE: "1"

      - name: Upload DMG to draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/icuvisor_*_macos_universal.dmg --clobber

  release-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: release
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Resolve MSI arch
        id: arch
        shell: pwsh
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          $map = @{ amd64 = "x64"; arm64 = "arm64" }
          $msiArch = $map[$env:MATRIX_ARCH]
          "msi_arch=$msiArch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Compute MSI version
        id: ver
        shell: pwsh
        env:
          REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          $tag = $env:REF_NAME -replace '^v', ''
          # Strip pre-release / build metadata. MSI ProductVersion only allows N.N.N.N.
          $core = ($tag -split '[-+]')[0]
          if ($core -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag $env:REF_NAME does not yield an N.N.N MSI version"
          }
          "version=$core" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download windows archive from draft release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ env.RELEASE_TAG }}
          MSI_VERSION: ${{ steps.ver.outputs.version }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          $asset = "icuvisor_${env:MSI_VERSION}_windows_${env:MATRIX_ARCH}.zip"
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          gh release download $env:REF_NAME --pattern $asset --dir stage
          Expand-Archive -Path "stage/$asset" -DestinationPath stage/extracted -Force
          Get-ChildItem stage/extracted

      - name: Install WiX v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix --version

      - name: Build MSI
        shell: pwsh
        env:
          MSI_VERSION: ${{ steps.ver.outputs.version }}
          MSI_ARCH: ${{ steps.arch.outputs.msi_arch }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          $out = "dist/icuvisor_${env:MSI_VERSION}_windows_${env:MATRIX_ARCH}.msi"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $binary = (Resolve-Path "stage/extracted/icuvisor.exe").Path
          $cliBinary = (Resolve-Path "stage/extracted/icuvisor-cli.exe").Path
          $license = (Resolve-Path "stage/extracted/LICENSE").Path
          $icon = (Resolve-Path "build/windows/icuvisor.ico").Path
          wix build `
            build/windows/icuvisor.wxs `
            -arch $env:MSI_ARCH `
            -d "Version=$env:MSI_VERSION" `
            -d "BinarySource=$binary" `
            -d "CLIExecutableSource=$cliBinary" `
            -d "LicenseSource=$license" `
            -d "IconSource=$icon" `
            -o $out
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Item $out

      - name: Check optional Trusted Signing secrets
        id: signing
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $enabled = if ($env:AZURE_TENANT_ID) { 'true' } else { 'false' }
          "enabled=$enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($enabled -eq 'false') {
            Write-Warning "AZURE_TENANT_ID secret not set; producing UNSIGNED MSI. See docs/release/windows.md to enable Authenticode signing."
          }

      - name: Sign MSI with Azure Trusted Signing
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload MSI to draft release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ env.RELEASE_TAG }}
        run: |
          gh release upload $env:REF_NAME (Get-ChildItem dist/*.msi).FullName --clobber

  finalize:
    name: Finalize checksums and publish
    runs-on: ubuntu-latest
    needs: release-windows
    permissions:
      contents: write
      id-token: write # cosign keyless OIDC
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download all release artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          cd dist
          gh release download "$RELEASE_TAG" \
            --pattern 'icuvisor_*_linux_*.tar.gz' \
            --pattern 'icuvisor_*_windows_*.zip' \
            --pattern 'icuvisor_*_windows_*.msi' \
            --pattern 'icuvisor_*_macos_universal.tar.gz' \
            --pattern 'icuvisor_*_macos_universal.dmg' \
            --pattern 'icuvisor_*_darwin_universal.mcpb'

      - name: Regenerate SHA256SUMS for promoted artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            icuvisor_*_linux_*.tar.gz \
            icuvisor_*_windows_*.zip \
            icuvisor_*_windows_*.msi \
            icuvisor_*_macos_universal.tar.gz \
            icuvisor_*_macos_universal.dmg \
            icuvisor_*_darwin_universal.mcpb \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign SHA256SUMS.txt with cosign (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --output-certificate SHA256SUMS.txt.pem \
            --output-signature   SHA256SUMS.txt.sig \
            SHA256SUMS.txt
          ls -la SHA256SUMS.txt SHA256SUMS.txt.pem SHA256SUMS.txt.sig

      - name: Upload final checksums and signatures to draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/SHA256SUMS.txt \
            dist/SHA256SUMS.txt.pem \
            dist/SHA256SUMS.txt.sig \
            --clobber

      - name: Publish draft release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$RELEASE_TAG" --draft=false

  publish-winget:
    name: Submit manifests to winget-pkgs
    runs-on: windows-latest
    needs: finalize
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') }}
    steps:
      - name: Guard on WINGET_PAT secret
        id: guard
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          if (-not $env:WINGET_PAT) {
            Write-Warning "WINGET_PAT secret not set; skipping Winget submission. Signing is not required for winget-pkgs, but a classic PAT with public_repo scope is required to open the manifest PR."
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Resolve package version
        if: steps.guard.outputs.skip == 'false'
        id: tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $tag = $env:RELEASE_TAG
          if (-not $tag) { throw "no tag provided" }
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag $tag does not yield a stable Winget PackageVersion"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Submit to winget-pkgs
        if: steps.guard.outputs.skip == 'false'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: RicardoCabral.icuvisor
          version: ${{ steps.tag.outputs.version }}
          installers-regex: '^icuvisor_.*_windows_(amd64|arm64)\.msi$'
          release-tag: ${{ steps.tag.outputs.tag }}
          token: ${{ secrets.WINGET_PAT }}
