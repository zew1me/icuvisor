name: Feature request
description: Suggest a new tool, transport, client integration, or improvement.
title: "feat: "
labels: ["type: feature", "status: triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the athlete-facing or coach-facing job-to-be-done. Skip the implementation for now.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like icuvisor to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, including doing nothing.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tools (read)
        - Tools (write)
        - Transports (stdio / HTTP)
        - Installation / packaging
        - Onboarding UI
        - Coach mode
        - Auto-update
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to forum threads, issues in upstream projects, or screenshots.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is consistent with the project scope (see ROADMAP.md and the PRD).
          required: true
